<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khiops-visualization demo</title>
    <link rel="stylesheet" href="./common-header.css" />
    <style>
      #file-opener {
        margin: 0 20px;
      }
      #open-file-btn {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 8px 16px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 14px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 4px;
        transition: background-color 0.3s;
      }
      #open-file-btn:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div id="tabs">
        <button class="tab active" data-component="visualization">
          Khiops Visualization
        </button>
        <button class="tab" data-component="covisualization">
          Khiops Covisualization
        </button>
      </div>
      <div id="file-opener">
        <input
          type="file"
          id="file-input"
          accept=".khj,.khcj,.json"
          style="display: none"
        />
        <button id="open-file-btn">Open File</button>
      </div>
      <div id="version-selector">
        <label for="version-select">Version:</label>
        <select id="version-select">
          <option value="">Loading versions...</option>
        </select>
      </div>
    </div>
    <div id="container"></div>
    <div
      id="loading-indicator"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 1000;
      "
    >
      <svg
        version="1.0"
        width="80"
        height="80"
        viewBox="0 0 496.31 305.509"
        xmlns="http://www.w3.org/2000/svg"
        style="margin: 0 auto 0px; display: block;"
      >
        <style>
          @keyframes drawFill {
            0% {
              stroke-dashoffset: 1200;
              fill-opacity: 0;
            }
            18% {
              stroke-dashoffset: 0;
              fill-opacity: 0;
            }
            28% {
              stroke-dashoffset: 0;
              fill-opacity: 1;
            }
            70% {
              stroke-dashoffset: 0;
              fill-opacity: 1;
            }
            88% {
              stroke-dashoffset: 1200;
              fill-opacity: 0;
            }
            100% {
              stroke-dashoffset: 1200;
              fill-opacity: 0;
            }
          }
          .shape {
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            fill-opacity: 0;
          }
          .s1 { animation: drawFill 1.8s ease-in-out 0s infinite; }
          .s2 { animation: drawFill 1.8s ease-in-out 0.02s infinite; }
          .s3 { animation: drawFill 1.8s ease-in-out 0.04s infinite; }
          .s4 { animation: drawFill 1.8s ease-in-out 0.08s infinite; }
          .s5 { animation: drawFill 1.8s ease-in-out 0.12s infinite; }
          .s6 { animation: drawFill 1.8s ease-in-out 0.16s infinite; }
          .s7 { animation: drawFill 1.8s ease-in-out 0.2s infinite; }
          .s8 { animation: drawFill 1.8s ease-in-out 0.24s infinite; }
        </style>
        <path
          class="shape s1"
          style="fill: #5f9ac7; stroke: #5f9ac7; stroke-width: 2; stroke-linejoin: round;"
          d="m259.43 0 10.732 41.142-94.356 28.827z"
        />
        <path
          class="shape s2"
          style="fill: #2e5674; stroke: #2e5674; stroke-width: 2; stroke-linejoin: round;"
          d="m259.43 0 10.732 41.142 39.138 9.382z"
        />
        <path
          class="shape s3"
          style="fill: #91cb47; stroke: #91cb47; stroke-width: 2; stroke-linejoin: round;"
          d="m276.207 64.315 12.806 49.09-165.849 29.05z"
        />
        <path
          class="shape s4"
          style="fill: #527823; stroke: #527823; stroke-width: 2; stroke-linejoin: round;"
          d="m276.207 64.315 12.806 49.09 78.288 11.98z"
        />
        <path
          class="shape s5"
          style="fill: #ffb448; stroke: #ffb448; stroke-width: 2; stroke-linejoin: round;"
          d="m295.528 138.378 13.514 51.806-246.25 33.15z"
        />
        <path
          class="shape s6"
          style="fill: #996823; stroke: #996823; stroke-width: 2; stroke-linejoin: round;"
          d="m295.528 138.378 13.514 51.806 119.647 21.577z"
        />
        <path
          class="shape s7"
          style="fill: #ed614e; stroke: #ed614e; stroke-width: 2; stroke-linejoin: round;"
          d="m316.075 217.14 15.414 59.091-331.49 28.495z"
        />
        <path
          class="shape s8"
          style="fill: #8e3327; stroke: #8e3327; stroke-width: 2; stroke-linejoin: round;"
          d="m316.075 217.14 15.414 59.091 164.82 29.278z"
        />
      </svg>
      <p
        id="loading-text"
        style="font-family: Arial, sans-serif; color: #666; font-size: 16px"
      >
        Loading Khiops components...
      </p>
    </div>
    <script id="dynamic-script"></script>
    <script src="./common-tabs.js"></script>
    <script>
      let currentVersion = null;

      // Fetch available versions from NPM registry
      async function fetchVersions() {
        try {
          const response = await fetch(
            'https://registry.npmjs.org/khiops-visualization',
          );
          const data = await response.json();
          const versions = Object.keys(data.versions).reverse(); // Latest first
          return versions;
        } catch (error) {
          console.error('Error fetching versions:', error);
          return [];
        }
      }

      // Load script for a specific version
      function loadScript(version) {
        // Update loading text with version info
        const loadingText = document.getElementById('loading-text');
        if (version === 'dev') {
          loadingText.textContent = 'Loading Khiops version development (dev)';
        } else if (version) {
          loadingText.textContent = `Loading Khiops version ${version}`;
        } else {
          loadingText.textContent = 'Loading Khiops latest version';
        }

        // Show loading indicator
        document.getElementById('loading-indicator').style.display = 'block';

        const scriptElement = document.getElementById('dynamic-script');
        let url;

        if (version === 'dev') {
          url = `./dist/khiops-webcomponents.bundle.js?v=${Math.random()}`;
        } else if (version) {
          // Encode version to prevent XSS
          const encodedVersion = encodeURIComponent(version);
          url = `https://cdn.jsdelivr.net/npm/khiops-visualization@${encodedVersion}/khiops-webcomponents.bundle.js`;
        } else {
          url =
            'https://cdn.jsdelivr.net/npm/khiops-visualization/khiops-webcomponents.bundle.js';
        }

        // Remove old script
        if (scriptElement.src) {
          scriptElement.remove();
          const newScript = document.createElement('script');
          newScript.id = 'dynamic-script';
          newScript.src = url;
          newScript.onload = () => {
            document.getElementById('loading-indicator').style.display = 'none';
            recreateComponent();
          };
          document.body.appendChild(newScript);
        } else {
          scriptElement.src = url;
          scriptElement.onload = () => {
            document.getElementById('loading-indicator').style.display = 'none';
            recreateComponent();
          };
        }
      }

      // Initialize version selector
      async function initVersionSelector() {
        const select = document.getElementById('version-select');
        const versions = await fetchVersions();

        if (versions.length === 0) {
          select.innerHTML =
            '<option value="">Failed to load versions</option>';
          return;
        }

        // Build options with dev at top
        let optionsHTML = '<option value="dev">dev (branch master)</option>';
        optionsHTML += '<option disabled>──────────</option>';
        optionsHTML += versions
          .map(
            (version) =>
              `<option value="${version}">${version}${version === versions[0] ? ' (latest)' : ''}</option>`,
          )
          .join('');

        select.innerHTML = optionsHTML;

        // Check URL parameter first
        const urlParams = new URLSearchParams(window.location.search);
        const versionParam = urlParams.get('v');

        if (versionParam === 'dev') {
          currentVersion = 'dev';
        } else if (versionParam && versions.includes(versionParam)) {
          currentVersion = versionParam;
        } else {
          // Default to latest NPM version
          currentVersion = versions[0];
        }

        select.value = currentVersion;

        // Add change event listener
        select.addEventListener('change', function () {
          const selectedVersion = this.value;
          if (selectedVersion && selectedVersion !== currentVersion) {
            currentVersion = selectedVersion;
            // Reload page without cache
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('v', selectedVersion);
            urlParams.set('component', currentComponent);
            urlParams.set('t', Date.now());
            window.location.href =
              window.location.href.split('?')[0] + '?' + urlParams.toString();
          }
        });

        // Load component from URL parameter
        const componentParam = urlParams.get('component');
        if (componentParam && componentConfig[componentParam]) {
          currentComponent = componentParam;
          updateActiveTab();
        }

        loadScript(currentVersion);
      }

      // File opener functionality
      function initFileOpener() {
        const fileInput = document.getElementById('file-input');
        const openFileBtn = document.getElementById('open-file-btn');

        openFileBtn.addEventListener('click', function () {
          fileInput.click();
        });

        fileInput.addEventListener('change', function (event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              try {
                const fileData = JSON.parse(e.target.result);
                displayKhiops(fileData);
              } catch (error) {
                console.error('Error parsing JSON file:', error);
                alert('Error: Invalid JSON file format');
              }
            };
            reader.readAsText(file);
          }
        });
      }

      // Display Khiops based on file type and switch tabs
      function displayKhiops(fileData) {
        if (fileData) {
          try {
            const jsonData = fileData;
            if (jsonData.tool === 'Khiops') {
              // Switch to visualization tab
              switchToComponent('visualization');

              // First, reset with empty data then load new file
              setTimeout(() => {
                const visualizationComponent = document.querySelector(
                  'khiops-visualization',
                );
                if (
                  visualizationComponent &&
                  typeof visualizationComponent.setDatas === 'function'
                ) {
                  // Reset with empty data first
                  visualizationComponent.setDatas({});

                  // Then load new file after a short delay
                  setTimeout(() => {
                    visualizationComponent.setConfig({ showProjectTab: false });
                    visualizationComponent.setDatas(jsonData);
                  }, 200);
                } else {
                  console.error(
                    'Visualization component not ready or missing setDatas function',
                  );
                }
              }, 1000);
            } else if (jsonData.tool === 'Khiops Coclustering') {
              // Switch to covisualization tab
              switchToComponent('covisualization');

              // First, reset with empty data then load new file
              setTimeout(() => {
                const covisualizationComponent = document.querySelector(
                  'khiops-covisualization',
                );
                if (
                  covisualizationComponent &&
                  typeof covisualizationComponent.setDatas === 'function'
                ) {
                  // Reset with empty data first
                  covisualizationComponent.setDatas({});

                  // Then load new file after a short delay
                  setTimeout(() => {
                    covisualizationComponent.setConfig({
                      showProjectTab: false,
                    });
                    covisualizationComponent.setDatas(jsonData);
                  }, 200);
                } else {
                  console.error(
                    'Covisualization component not ready or missing setDatas function',
                  );
                }
              }, 1000);
            } else {
              alert(
                'Unknown file type. Expected Khiops or Khiops Coclustering format.',
              );
            }
          } catch (error) {
            console.error('Error processing file data:', error);
            alert('Error processing file data');
          }
        }
      }

      // For external CDN script, use DOMContentLoaded as fallback
      // but add additional check for component availability
      document.addEventListener('DOMContentLoaded', function () {
        initTabs();
        initVersionSelector();
        initFileOpener();
      });
    </script>
  </body>
</html>
