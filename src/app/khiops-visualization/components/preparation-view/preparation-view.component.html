<div id="preparation-view-comp" fxFlexFill>
  @if (loadingView) {
    <div fxLayout="column" fxFlexFill fxLayoutAlign="center center">
      <mat-spinner
        diameter="40"
        color="accent"
        mode="indeterminate"
      ></mat-spinner>
    </div>
  }
  @if (!loadingView) {
    <dv-dockview
      [components]="dockviewComponents"
      (ready)="onDockviewReady($event)"
    ></dv-dockview>
  }
</div>
