<div id="user-settings-comp" fxFlexFill fxLayout="column">
  <div
    fxLayout="row"
    id="user-settings-header"
    class=""
    fxLayoutAlign="center center"
  >
    <button mat-stroked-button (click)="onClickOnCancel()">
      {{ 'GLOBAL.CANCEL' | translate }}
    </button>
    <h2 fxFlex>{{ 'GLOBAL.SETTINGS' | translate }}</h2>
    <button mat-flat-button (click)="onClickOnSave()" color="primary">
      {{ 'GLOBAL.SAVE' | translate }}
    </button>
  </div>
  <div fxLayout="column" id="user-settings-content" fxLayoutAlign="start start">
    <kl-number-precision
      [(numberPrecision)]="numberPrecision"
    ></kl-number-precision>
    <kl-matrix-contrast-setting
      [(contrastValue)]="contrastValue"
    ></kl-matrix-contrast-setting>
    <div
      class="kl-auto-scale-setting"
      fxLayout="column"
      fxLayoutAlign="start start"
      [class.disabled]="!autoScaleEnabled"
    >
      <h2 fxLayoutAlign="start center">
        {{ 'SCALE_PERSISTENCE.AUTO_SCALE_FACTOR_TITLE' | translate }}
        <mat-icon
          *ngIf="!autoScaleEnabled"
          matTooltip="{{
            'SCALE_PERSISTENCE.AUTO_SCALE_FACTOR_DISABLED_TOOLTIP' | translate
          }}"
          >info</mat-icon
        >
      </h2>
      <div fxLayout="row" fxLayoutAlign="start center">
        <mat-slider
          [min]="1"
          [max]="5"
          [step]="0.1"
          [disabled]="!autoScaleEnabled"
          attr.aria-label="{{
            'SCALE_PERSISTENCE.AUTO_SCALE_FACTOR' | translate
          }}"
        >
          <input matSliderThumb [(ngModel)]="autoScaleFactor" />
        </mat-slider>
        <span>{{ autoScaleFactor | number: '1.1-1' }}</span>
      </div>
      <p class="factor-description">
        {{ 'SCALE_PERSISTENCE.AUTO_SCALE_FACTOR_DESCRIPTION' | translate }}
      </p>
    </div>
    <kl-clear-ls></kl-clear-ls>
    <kl-npm-version></kl-npm-version>
  </div>
</div>
