<div
  id="cell-stats-comp"
  fxLayout="row"
  fxFlexFill
  fxLayoutAlign="center center"
>
  @if (cellStats(); as stats) {
    <div class="cell-stats-content">
      <b>{{ 'GLOBAL.CELL_STATS' | translate }}</b>
      <span title="{{ 'TOOLTIPS.MATRIX.CELL_STATS_FREQUENCY' | translate }}"
        >F= {{ stats.F | toPrecision }}</span
      >
      <span
        title="{{
          'TOOLTIPS.MATRIX.CELL_STATS_EXPECTED_FREQUENCY' | translate
        }}"
        >EF= {{ stats.EF | toPrecision }}</span
      >
      @if (stats.I !== undefined) {
        <span>I= {{ stats.I | toPrecision }}</span>
      }
      @if (stats.Total !== undefined) {
        <span>Total= {{ stats.Total | toPrecision }} </span>
      }
    </div>
  }
</div>
