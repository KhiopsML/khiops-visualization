<div id="confirm-dialog-comp">
  @if (title) {
    <h1 style="margin-left: 0; margin-bottom: 1.5rem">
      {{ title }}
    </h1>
  }
  <span>
    {{ message }}
  </span>
  <div fxLayout="row" fxLayoutAlign="end center">
    <button mat-button cdkFocusInitial (click)="confirm()">
      {{ confirmButtonText }}
    </button>
    @if (displayRejectBtn) {
      <button mat-button (click)="reject()">
        {{ 'GLOBAL.NO' | translate }}
      </button>
    }
    @if (displayCancelBtn) {
      <button mat-button (click)="cancel()">
        {{ 'GLOBAL.CANCEL' | translate }}
      </button>
    }
  </div>
</div>
