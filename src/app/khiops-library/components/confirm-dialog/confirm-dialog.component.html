<div id="confirm-dialog-comp">
  @if (title) {
    <h1>
      {{ title }}
    </h1>
  }
  <span>
    {{ message }}
  </span>
  <div fxLayout="row" fxLayoutAlign="end center">
    <button
      cdkFocusInitial
      (click)="confirm()"
      mat-flat-button
      color="warn"
    >
      {{ confirmButtonText }}
    </button>
    @if (displayYesToAllBtn) {
      <button mat-stroked-button (click)="confirmAll()">
        {{ 'GLOBAL.YES_TO_ALL' | translate }}
      </button>
    }
    @if (displayRejectBtn) {
      <button mat-stroked-button (click)="reject()">
        {{ 'GLOBAL.NO' | translate }}
      </button>
    }
    @if (displayNoToAllBtn) {
      <button mat-stroked-button (click)="rejectAll()">
        {{ 'GLOBAL.NO_TO_ALL' | translate }}
      </button>
    }
    @if (displayCancelBtn) {
      <button mat-stroked-button (click)="cancel()">
        {{ 'GLOBAL.CANCEL' | translate }}
      </button>
    }
  </div>
</div>
