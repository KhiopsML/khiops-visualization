<div class="legend-comp" [ngClass]="position">
  @if (legend && legend.length !== 0) {
    <div class="legend scrollbar-thin" tabindex="0">
      @for (data of legend; track data.value || data.title || $index) {
        <div
          class="legend-item"
          fxLayout="row"
          fxLayoutAlign="start center"
          (click)="selectLegendItem(data.name)"
          [ngClass]="{ 'legend-selected': selectedItem === data.name }"
          title="{{ tooltip || data.name }}"
        >
          <div
            class="square"
            [style.background-color]="data.borderColor"
            [style.border-color]="data.color"
          ></div>
          <span>{{ data.shortname }}</span>
        </div>
      }
    </div>
  }
</div>
