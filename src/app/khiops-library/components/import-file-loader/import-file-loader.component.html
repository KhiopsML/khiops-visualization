<div class="import-file-loader-comp" fxFlexFill fxLayout="column">
  @if (!isLoadingDatas) {
    <div
      class="import-file-loader-row"
      fxLayout="row"
      fxLayoutAlign="end center"
    >
      <button
        id="import-new-file-btn"
        class="yellow-btn"
        type="button"
        mat-flat-button
        color="primary"
        (click)="fileInput.click()"
      >
        {{ translate.get('GLOBAL.IMPORT_NEW_FILE') }}
      </button>
      <input
        hidden
        (change)="openFileDialog($event)"
        #fileInput
        type="file"
        id="file"
        accept=".txt"
      />
    </div>
  }
  @if (isLoadingDatas) {
    <div id="loading-indicator" fxFlexFill fxLayoutAlign="center center">
      <mat-spinner
        diameter="40"
        color="accent"
        mode="indeterminate"
      ></mat-spinner>
    </div>
  }
</div>
