<div
  class="load-ext-datas-comp"
  fxFlexFill
  fxLayoutAlign="center center"
  fxLayout="column"
>
  <div fxLayout="row" id="load-ext-datas-header" fxLayoutAlign="center center">
    <h2 fxFlex>{{ 'GLOBAL.EXTERNAL_DATA' | translate | uppercase }}</h2>
  </div>
  <div
    class="load-ext-datas-content"
    fxFlexFill
    fxLayoutAlign="center center"
    fxLayout="column"
  >
    @if (!loadingDatasStatus) {
      <mat-spinner
        diameter="40"
        color="accent"
        mode="indeterminate"
      ></mat-spinner>
    }
    @if (loadingDatasStatus) {
      <mat-progress-bar mode="determinate" [value]="loadingDatasPercent">
      </mat-progress-bar>
    }
    <span>{{ loadingDatasStatus }}</span>
  </div>
</div>
